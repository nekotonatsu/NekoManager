services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    volumes:
      - ./backend:/var/www/html
    environment:
        APP_ENV: local
        APP_DEBUG: "true"
        DB_HOST: mysql
        DB_DATABASE: ${MYSQL_DATABASE}
        DB_USERNAME: ${MYSQL_USER}
        DB_PASSWORD: ${MYSQL_PASSWORD}

  nginx:
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
  
  frontend:
    image: node:20-alpine
    container_name: neko_manager_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - cat_watching_net

  phpmyadmin:
    image: phpmyadmin
    container_name: neko_phpadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cat_watching_net